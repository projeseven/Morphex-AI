<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphex-AI - Giriş</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <h1>🤖 Morphex-AI</h1>
                <p>Türkçe Yapay Zeka Sohbet & Kod Asistanı</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Giriş Yap</button>
                <button class="tab-btn" onclick="showTab('register')">Kayıt Ol</button>
            </div>
            
            <!-- Giriş Tab -->
            <div id="login" class="tab-content active">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login-username">Kullanıcı Adı</label>
                        <input type="text" id="login-username" placeholder="Kullanıcı adınız" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Şifre</label>
                        <input type="password" id="login-password" placeholder="Şifreniz" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Giriş Yap</button>
                </form>
                <div id="loginMessage" class="message"></div>
            </div>
            
            <!-- Kayıt Tab -->
            <div id="register" class="tab-content">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="register-username">Kullanıcı Adı</label>
                        <input type="text" id="register-username" placeholder="Kullanıcı adınız" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="E-posta adresiniz" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-password">Şifre</label>
                        <input type="password" id="register-password" placeholder="Şifre" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-password-confirm">Şifre Tekrar</label>
                        <input type="password" id="register-password-confirm" placeholder="Şifre tekrar" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Kayıt Ol</button>
                </form>
                <div id="registerMessage" class="message"></div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
